suite: Choice types (value[x] → expanded variants + choices parent)

defaults:
  sd:
    resourceType: StructureDefinition
    status: active
    kind: resource
    derivation: specialization
    url: http://test/T
    name: T
    type: T

tests:
  - desc: value[x] with two types expands into valueString + valueInteger plus parent
    sd:
      differential:
        element:
          - path: T.value[x]
            type:
              - { code: string }
              - { code: integer }
    expected:
      elements:
        value:
          choices: [valueString, valueInteger]
        valueString:
          type: string
          choiceOf: value
        valueInteger:
          type: integer
          choiceOf: value

  - desc: required choice (min=1) → parent goes into required
    sd:
      differential:
        element:
          - path: T.value[x]
            min: 1
            type:
              - { code: string }
              - { code: boolean }
    expected:
      elements:
        value:
          choices: [valueString, valueBoolean]
      required: [value]

  - desc: single-type [x] still creates choices wrapper
    sd:
      differential:
        element:
          - path: T.value[x]
            type:
              - { code: string }
    expected:
      elements:
        value:
          choices: [valueString]
        valueString:
          type: string
          choiceOf: value
