suite: Primitive validation (fs1xx)
# Imported from atomic-ehr/aidbox fhir-clj `primitives-test`
# (../aidbox/box/libs/fhir-clj/test/fhir/validator/core_test.clj:376-712).
# Coverage mirrors the reference Clojure validator.
#
# Mapping table aidbox → ours:
#   invalid-type (wrong JSON kind)   → fs101 expected-string | fs102 expected-number | fs103 expected-boolean
#   invalid-type (wrong literal)     → fs104..fs123 invalid-<TYPE>
#   empty-value                      → fs1xx invalid-* (string-like) or fs204
#   unexpected-object                → fs204 expected-primitive

tests:
  # ─── boolean ──────────────────────────────────────────────────────────
  - desc: boolean true
    schemas: [{ elements: { value: { type: boolean } } }]
    data: { value: true }
    valid: true
  - desc: boolean false
    schemas: [{ elements: { value: { type: boolean } } }]
    data: { value: false }
    valid: true
  - desc: boolean rejects string
    schemas: [{ elements: { value: { type: boolean } } }]
    data: { value: 'true' }
    issues: [{ code: fs103, path: [value] }]
  - desc: boolean rejects number
    schemas: [{ elements: { value: { type: boolean } } }]
    data: { value: 1 }
    issues: [{ code: fs103, path: [value] }]
  - desc: boolean rejects object
    schemas: [{ elements: { value: { type: boolean } } }]
    data: { value: { id: '1' } }
    issues: [{ code: fs204, path: [value] }]

  # ─── integer (int32) ──────────────────────────────────────────────────
  - desc: integer accepts whole number
    schemas: [{ elements: { value: { type: integer } } }]
    data: { value: 12 }
    valid: true
  - desc: integer accepts negative
    schemas: [{ elements: { value: { type: integer } } }]
    data: { value: -300 }
    valid: true
  - desc: integer rejects 3.1
    schemas: [{ elements: { value: { type: integer } } }]
    data: { value: 3.1 }
    issues: [{ code: fs112, path: [value] }]
  - desc: integer rejects string
    schemas: [{ elements: { value: { type: integer } } }]
    data: { value: '42' }
    issues: [{ code: fs102, path: [value] }]
  - desc: integer accepts INT32_MAX
    schemas: [{ elements: { value: { type: integer } } }]
    data: { value: 2147483647 }
    valid: true
  - desc: integer accepts INT32_MIN
    schemas: [{ elements: { value: { type: integer } } }]
    data: { value: -2147483648 }
    valid: true
  - desc: integer rejects INT32_MAX+1
    schemas: [{ elements: { value: { type: integer } } }]
    data: { value: 2147483648 }
    issues: [{ code: fs112, path: [value] }]
  - desc: integer rejects INT32_MIN-1
    schemas: [{ elements: { value: { type: integer } } }]
    data: { value: -2147483649 }
    issues: [{ code: fs112, path: [value] }]
  # Note: aidbox also rejects `1.0` for integer. JS cannot distinguish
  # `1.0` from `1` after JSON.parse (Number.isInteger(1.0) === true), so
  # this case is not expressible here. Documented as a JS-platform limit.

  # ─── integer64 (JSON string per FHIR R5) ──────────────────────────────
  - desc: integer64 accepts "0"
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '0' }
    valid: true
  - desc: integer64 accepts "123"
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '123' }
    valid: true
  - desc: integer64 accepts "-123"
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '-123' }
    valid: true
  - desc: integer64 accepts max int64
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '9223372036854775807' }
    valid: true
  - desc: integer64 rejects empty
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '' }
    issues: [{ code: fs113, path: [value] }]
  - desc: integer64 rejects leading zero "01"
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '01' }
    issues: [{ code: fs113, path: [value] }]
  - desc: integer64 rejects "+123"
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '+123' }
    issues: [{ code: fs113, path: [value] }]
  - desc: integer64 rejects "-0"
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '-0' }
    issues: [{ code: fs113, path: [value] }]
  - desc: integer64 rejects "abc"
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: 'abc' }
    issues: [{ code: fs113, path: [value] }]
  - desc: integer64 rejects "1.5"
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '1.5' }
    issues: [{ code: fs113, path: [value] }]
  - desc: integer64 rejects whitespace
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: ' 1' }
    issues: [{ code: fs113, path: [value] }]
  - desc: integer64 rejects overflow
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: '9223372036854775808' }
    issues: [{ code: fs113, path: [value] }]
  - desc: integer64 rejects JSON number
    schemas: [{ elements: { value: { type: integer64 } } }]
    data: { value: 123 }
    issues: [{ code: fs101, path: [value] }]

  # ─── unsignedInt ──────────────────────────────────────────────────────
