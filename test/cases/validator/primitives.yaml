  # ─── primitive vs object collision ────────────────────────────────────
  - desc: object where primitive expected — fs204
    schemas: [{ elements: { active: { type: boolean } } }]
    data: { active: { id: '1' } }
    issues: [{ code: fs204, path: [active] }]
