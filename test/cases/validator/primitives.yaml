  - desc: unsignedInt accepts 1
    schemas: [{ elements: { value: { type: unsignedInt } } }]
    data: { value: 1 }
    valid: true
  - desc: unsignedInt rejects -1
    schemas: [{ elements: { value: { type: unsignedInt } } }]
    data: { value: -1 }
    issues: [{ code: fs119, path: [value] }]
  - desc: unsignedInt rejects 9.2
    schemas: [{ elements: { value: { type: unsignedInt } } }]
    data: { value: 9.2 }
    issues: [{ code: fs112, path: [value] }]
  - desc: unsignedInt accepts INT32_MAX
    schemas: [{ elements: { value: { type: unsignedInt } } }]
    data: { value: 2147483647 }
