  - desc: 'url accepts http://'
    schemas: [{ elements: { value: { type: url } } }]
    data: { value: 'http://example.com' }
    valid: true
  - desc: url accepts with port/path/query
    schemas: [{ elements: { value: { type: url } } }]
    data: { value: 'http://example.com:1337/hello?name=joe' }
    valid: true

  # ─── xhtml ────────────────────────────────────────────────────────────
