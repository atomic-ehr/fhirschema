  - desc: base64Binary rejects empty
    schemas: [{ elements: { value: { type: base64Binary } } }]
    data: { value: '' }
    issues: [{ code: fs104, path: [value] }]

  # ─── markdown ─────────────────────────────────────────────────────────
  - desc: markdown accepts bold
    schemas: [{ elements: { value: { type: markdown } } }]
    data: { value: '**Bold Text**' }
