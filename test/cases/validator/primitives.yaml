  # ─── decimal ──────────────────────────────────────────────────────────
  - desc: decimal accepts integer
    schemas: [{ elements: { value: { type: decimal } } }]
    data: { value: 12 }
    valid: true
  - desc: decimal accepts 3.14
    schemas: [{ elements: { value: { type: decimal } } }]
    data: { value: 3.14 }
    valid: true
  - desc: decimal accepts -62e+3
    schemas: [{ elements: { value: { type: decimal } } }]
    data: { value: -62e+3 }
    valid: true
  - desc: decimal rejects string "9.2"
    schemas: [{ elements: { value: { type: decimal } } }]
    data: { value: '9.2' }
    issues: [{ code: fs102, path: [value] }]

  # ─── dateTime ─────────────────────────────────────────────────────────
  - desc: dateTime accepts year only
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2018' }
    valid: true
  - desc: dateTime accepts yyyy-mm
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '1973-06' }
    valid: true
  - desc: dateTime accepts yyyy-mm-dd
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '1905-08-23' }
    valid: true
  - desc: dateTime accepts full with negative offset
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2015-02-07T13:28:17-05:00' }
    valid: true
  - desc: dateTime accepts full with positive offset
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2015-02-07T13:28:17+05:00' }
    valid: true
  - desc: dateTime accepts Z
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2017-01-01T00:00:00Z' }
    valid: true
  - desc: dateTime accepts millisecond fraction
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2017-01-01T00:00:00.000Z' }
    valid: true
  - desc: dateTime accepts +14:00 offset (boundary)
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2015-02-07T13:28:17+14:00' }
    valid: true
  - desc: dateTime rejects "201" (short year)
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '201' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects "0000"
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '0000' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects "000a"
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '000a' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects "2000-00" (zero month)
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2000-00' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects "2000-13" (out-of-range month)
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2000-13' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects "2024-02-31" (impossible day)
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2024-02-31' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects "2023-02-29" (non-leap)
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2023-02-29' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects "2015-02-07T15:15" (missing seconds)
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2015-02-07T15:15' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects "2015-02-07T15:15:15" (missing tz)
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2015-02-07T15:15:15' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects hour 25
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2017-01-01T25:00:00Z' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects minute 60
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2017-01-01T00:60:00Z' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects offset +14:01 (boundary+1)
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2015-02-07T13:28:17+14:01' }
    issues: [{ code: fs108, path: [value] }]
  - desc: dateTime rejects offset +24:00
    schemas: [{ elements: { value: { type: dateTime } } }]
    data: { value: '2015-02-07T13:28:17+24:00' }
    issues: [{ code: fs108, path: [value] }]

  # ─── time ─────────────────────────────────────────────────────────────
  - desc: time accepts hh:mm:ss
    schemas: [{ elements: { value: { type: time } } }]
    data: { value: '12:03:00' }
