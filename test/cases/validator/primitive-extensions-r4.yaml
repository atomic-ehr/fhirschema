suite: 'primitive extensions on real R4 elements (sansara L2261 partial)'
# Cases that rely on real R4 extension fixtures (patient-birthTime,
# humanname-own-prefix). The "invalid valueString in patient-birthTime"
# case (sansara L2305) is intentionally NOT here — it requires _field
# deep validation (planned feature D) to surface the fs801. Re-import
# once D lands.

defaults:
  useR4: true

tests:
  - desc: 'valid extension on _birthDate (patient-birthTime, valueDateTime)'
    schemas: []
    data:
      resourceType: Patient
      birthDate: '1974-12-25'
      _birthDate:
        extension:
          - url: http://hl7.org/fhir/StructureDefinition/patient-birthTime
            valueDateTime: '1974-12-25T14:35:45-05:00'
    valid: true

  - desc: 'valid extension on _birthDate with year-only valueDateTime'
    schemas: []
    data:
      resourceType: Patient
      birthDate: '1974-12-25'
      _birthDate:
        extension:
          - url: http://hl7.org/fhir/StructureDefinition/patient-birthTime
            valueDateTime: '2020'
    valid: true

  - desc: 'FHIR general person sample (large realistic Patient)'
    schemas: []
    data:
      resourceType: Patient
      id: example
      identifier:
        - use: usual
          type:
            coding:
              - system: http://terminology.hl7.org/CodeSystem/v2-0203
                code: MR
          system: 'urn:oid:1.2.36.146.595.217.0.1'
          value: '12345'
          period: { start: '2001-05-06' }
          assigner: { display: 'Acme Healthcare' }
      active: true
      name:
        - { use: official, family: Chalmers, given: [Peter, James] }
        - { use: usual, given: [Jim] }
        - use: maiden
          family: Windsor
          given: [Peter, James]
          period: { end: '2002' }
      telecom:
        - { use: home }
        - { system: phone, value: '(03) 5555 6473', use: work, rank: 1 }
        - { system: phone, value: '(03) 3410 5613', use: mobile, rank: 2 }
        - system: phone
          value: '(03) 5555 8834'
          use: old
          period: { end: '2014' }
      gender: male
      birthDate: '1974-12-25'
      _birthDate:
        extension:
          - url: http://hl7.org/fhir/StructureDefinition/patient-birthTime
            valueDateTime: '1974-12-25T14:35:45-05:00'
      deceasedBoolean: false
      address:
        - use: home
          type: both
          text: '534 Erewhon St PeasantVille Rainbow Vic  3999'
          line: ['534 Erewhon St']
          city: PleasantVille
          district: Rainbow
          state: Vic
          postalCode: '3999'
          period: { start: '1974-12-25' }
      contact:
        - relationship:
            - coding:
                - system: http://terminology.hl7.org/CodeSystem/v2-0131
                  code: N
          name:
            family: 'du Marché'
            _family:
              extension:
                - url: http://hl7.org/fhir/StructureDefinition/humanname-own-prefix
                  valueString: VV
            given: ['Bénédicte']
          telecom:
            - { system: phone, value: '+33 (237) 998327' }
          address:
            use: home
            type: both
            line: ['534 Erewhon St']
            city: PleasantVille
            district: Rainbow
            state: Vic
            postalCode: '3999'
            period: { start: '1974-12-25' }
          gender: female
          period: { start: '2012' }
      managingOrganization: { reference: 'Organization/1' }
    valid: true

  # ─── _field deep validation (D) ─────────────────────────────────────
  - desc: 'invalid valueString inside patient-birthTime extension → fs801'
    schemas: []
    data:
      resourceType: Patient
      birthDate: '1974-12-25'
      _birthDate:
        extension:
          - url: http://hl7.org/fhir/StructureDefinition/patient-birthTime
            valueString: somestring
    issues:
      - { code: fs801, path: [_birthDate, extension, 0, valueString] }

  - desc: '_active payload is a string (scalar primitive, must be object) → fs401'
    schemas: []
    data:
      resourceType: Patient
      _active: test
    issues:
      - { code: fs401, path: [_active] }

  - desc: '_active payload is an array (scalar primitive, must be object) → fs401'
    schemas: []
    data:
      resourceType: Patient
      _active:
        - id: test
    issues:
      - { code: fs401, path: [_active] }

  - desc: '_given as object when array expected (given is array primitive) → fs401'
    schemas: []
    data:
      resourceType: Patient
      name:
        - given: [a]
          _given: { id: test }
    issues:
      - { code: fs401, path: [name, 0, _given] }

  - desc: '_given as array of Elements → valid (matches array primitive shape)'
    schemas: []
    data:
      resourceType: Patient
      name:
        - given: [a]
          _given:
            - id: test
              extension:
                - url: http://hl7.org/fhir/StructureDefinition/humanname-own-prefix
                  valueString: VV
    valid: true

  - desc: '_given as array with null placeholders → valid'
    schemas: []
    data:
      resourceType: Patient
      name:
        - given: [a, b]
          _given:
            - null
            - id: shadow-b
    valid: true
