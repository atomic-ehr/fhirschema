- desc: graham/reslicing-instance
  schemas: []
  _loadProfile:
  - reslicing-profile.json
  data:
    resourceType: AuditEvent
    id: MyAuditEventInstance
    meta:
      profile:
      - http://example.org/reslicedextension/StructureDefinition/MyAuditEventProfile
    agent:
    - extension:
      - valueIdentifier:
          system: http://hl7.org/fhir/sid/us-npi
          value: '67890'
          use: official
        url: http://hl7.org/fhir/StructureDefinition/auditevent-AlternativeUserID
      - valueIdentifier:
          system: https://test
          value: test
        url: http://hl7.org/fhir/StructureDefinition/auditevent-AlternativeUserID
      who:
        reference: Patient/Bob
    code:
      coding:
      - code: '110122'
        system: http://dicom.nema.org/resources/ontology/DCM
        display: Login
    recorded: '2013-06-20T23:41:23Z'
    source:
      observer:
        reference: Patient/Bob
  valid: true
