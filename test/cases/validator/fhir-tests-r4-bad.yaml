suite: Graham fhir-test-cases — R4 bad cases
defaults:
  useR4: true
tests:
- desc: 'fhir-tests/attachment-with-invalid-binary: Media.content.data not base64 → fs104'
  schemas: []
  data:
    resourceType: Media
    status: not-done
    content:
      contentType: application/octet-stream
      data: '%%%2@()()'
      title: bbbb syst
  issues:
  - code: fs104
    path:
    - content
    - data
- desc: 'fhir-tests/empty-array: DocumentReference.category[0].coding=[] → fs303'
  schemas: []
  data:
    resourceType: DocumentReference
    status: current
    category:
    - coding: []
    content:
    - attachment:
        contentType: text/plain
        data: Zm9v
  issues:
  - code: fs303
    path:
    - category
    - 0
    - coding
- desc: 'fhir-tests/ai3: Patient with extra property `unknownElement` → fs201'
  schemas: []
  data:
    resourceType: Patient
    id: example
    identifier:
    - system: http://example.org/patient-identifier
      value: '123456'
    name:
    - family: Smith
      given:
      - John
      - A.
    gender: male
    birthDate: '1980-01-01'
    unknownElement: foo
  issues:
  - code: fs201
    path:
    - unknownElement
- desc: 'fhir-tests/ai4: Patient.birthDate = "not a date" → fs107'
  schemas: []
  data:
    resourceType: Patient
    id: example
    gender: male
    birthDate: not a date
  issues:
  - code: fs107
    path:
    - birthDate
- desc: 'fhir-tests/allergy: _category extension-only with required binding → fs501'
  schemas: []
  data:
    resourceType: AllergyIntolerance
    clinicalStatus:
      coding:
      - system: http://terminology.hl7.org/CodeSystem/allergyintolerance-clinical
        code: active
    type: allergy
    _category:
    - extension:
      - url: http://hl7.org/fhir/StructureDefinition/data-absent-reason
        valueCode: unknown
    patient:
      reference: Patient/abc
  issues:
  - code: fs501
    path:
    - category
- desc: 'fhir-tests/attachment-tx: data field not valid base64 → fs104'
  schemas: []
  data:
    resourceType: Parameters
    parameter:
    - name: input
      valueAttachment:
        contentType: image/jpeg
        data: not.base64!
  issues:
  - code: fs104
    path:
    - parameter
    - 0
    - valueAttachment
    - data
- desc: fhir-tests/bundle-duplicate-id
  schemas: []
  data:
    resourceType: Bundle
    id: bundle-duplicate-id
    type: collection
    entry:
    - fullUrl: Patient/1
      resource:
        resourceType: Patient
        id: '1'
    - fullUrl: RelatedPerson/1
      resource:
        resourceType: RelatedPerson
        id: '1'
        patient:
          reference: Patient/1
  issues:
  - code: fs1003
  - code: fs1003
- desc: fhir-tests/resource-invalid-id-3
  schemas: []
  data:
    resourceType: Location
    id: foobar
    name: A Location
    managingOrganization:
      reference: '#org_1'
    contained:
    - resourceType: Organization
      id: org_1
      name: Test
  issues:
  - code: fs110
  skip: true
  _skipReason: 'R4 translator gap: Resource.id typed `string` (typeCode extension not lifted); R5 normalized — equivalent R5 cases work. (DESIGN
    §15 → "R4 Resource.id typing")'
- desc: fhir-tests/comments-4
  schemas: []
  data:
    resourceType: Patient
    id: example
    fhir_comments:
    - ' This comment should be valid in DSTU2 '
    - true
  issues:
  - code: fs201
  skip: true
  _skipReason: fhir_comments uniformly tolerated (matches Java default); Java strict-mode fs201 on non-string entries is not implemented. (DESIGN
    §15 → "fhir_comments non-string entries")
- desc: fhir-tests/ai6
  schemas: []
  data:
    resourceType: Patient
    id: example
    meta:
      profile:
      - http://example.org/patient-profile
      - http://example.org/other-patient-profile
    name:
    - family: Smith
      given:
      - John
      - A.
    gender: male
    birthDate: '1980-01-01'
  issues:
  - code: fs301
  skip: true
  _skipReason: 'Profile-loading case mis-classified into candidate bucket: references unloaded `http://example.org/other-patient-profile` via
    meta.profile. Belongs in profile-loading import. (see test/cases/imports/FHIR-TEST-CASES.md "Importable today")'
- desc: fhir-tests/ai7
  schemas: []
  data:
    resourceType: StructureDefinition
    url: http://example.org/patient-profile
    type: Patient
    baseDefinition: http://hl7.org/fhir/StructureDefinition/Patient
    derivation: constraint
    kind: resource
    differential:
      element:
      - id: Patient.identifier
        path: Patient.identifier
        short: Patient identifier
        definition: An identifier for the patient that includes a system and a value.
        max: '0'
      - id: Patient.name
        path: Patient.name
        short: Patient name
        definition: The name of the patient, including a given name and a family name.
        min: 1
        max: '1'
        type:
        - code: HumanName
      - id: Patient.birthDate
        path: Patient.birthDate
        short: Patient birth date
        definition: The date of birth for the patient, represented as yyyy-MM-dd.
        min: 1
        max: '1'
        type:
        - code: date
  issues:
  - code: fs301
  - code: fs301
  - code: fs301
