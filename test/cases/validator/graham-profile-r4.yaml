  data:
    resourceType: OperationDefinition
    id: opdef-params
    url: http://hl7.org/fhir/test/OperationDefinition/opdef-parameters
    version: 2.1.0
    name: DTRNextQuestion
    title: DTR Next Question Operation
    status: active
    kind: operation
    date: '2025-04-07T18:19:56+00:00'
    publisher: HL7 International / Clinical Decision Support
    contact:
    - name: HL7 International / Clinical Decision Support
      telecom:
      - system: url
        value: http://www.hl7.org/Special/committees/dss
    description: The Next Question operation is used for *adaptive questionnaires*.  For specific details, see the [SDC Next Question operation](http://hl7.org/fhir/uv/sdc/OperationDefinition/Questionnaire-next-question).
    jurisdiction:
    - coding:
      - system: urn:iso:std:iso:3166
        code: US
    code: next-question
    comment: To return a calculated score for the questionnaire or group of items, the service may return a `readOnly` question with the score
      value in the corresponding QuestionnaireResponse.item.  The extension `questionnaire-hidden` can be included on the Questionnaire.item to
      indicate to the client that it should not be displayed to the end user
    base: http://hl7.org/fhir/uv/sdc/OperationDefinition/Questionnaire-next-question
    resource:
    - Questionnaire
    system: false
    type: true
    instance: false
    inputProfile: http://hl7.org/fhir/test/StructureDefinition/op-def-in-profile
    outputProfile: http://hl7.org/fhir/test/StructureDefinition/op-def-out-profile
    parameter:
    - name: questionnaire-response-in
      use: in
      min: 1
      max: '1'
      documentation: The [DTR QuestionnaireResponse Profile](StructureDefinition-dtr-questionnaireresponse.html) of the QuestionnaireResponse
        resource with a *contained* Questionnaire.  When invoking the operation for the first time, neither the QuestionnaireResponse nor the
        contained Questionnaire will have any items, as no questions are yet known.  In subsequent calls, the QuestionnaireResponse will include
        answers to all required questions asked so far and the contained QuestionnaireResponse will remain the same as provided back from the
        operation in the preceding response.
      type: Resource
    - name: questionnaire
      use: in
      min: 0
      max: '*'
      documentation: The [DTR QuestionnaireResponse Profile](StructureDefinition-dtr-questionnaireresponse.html) of the QuestionnaireResponse
        resource with a *contained* Questionnaire.  When invoking the operation for the first time, neither the QuestionnaireResponse nor the
        contained Questionnaire will have any items, as no questions are yet known.  In subsequent calls, the QuestionnaireResponse will include
        answers to all required questions asked so far and the contained QuestionnaireResponse will remain the same as provided back from the
        operation in the preceding response.
      targetProfile:
      - http://hl7.org/fhir/us/davinci-dtr/StructureDefinition/dtr-questionnaireresponse
      type: QuestionnaireResponse
    - name: questionnaire
      use: out
      min: 1
      max: '1'
      documentation: The [DTR QuestionnaireResponse Profile](StructureDefinition-dtr-questionnaireresponse.html) of the QuestionnaireResponse
        resource with a *contained* Questionnaire.  When invoking the operation for the first time, neither the QuestionnaireResponse nor the
        contained Questionnaire will have any items, as no questions are yet known.  In subsequent calls, the QuestionnaireResponse will include
        answers to all required questions asked so far and the contained QuestionnaireResponse will remain the same as provided back from the
        operation in the preceding response.
      type: Questionnaire
    - name: questionnaire-response-out
      use: out
      min: 1
      max: '1'
      documentation: The [DTR QuestionnaireResponse Profile](StructureDefinition-dtr-questionnaireresponse.html) of the QuestionnaireResponse
        resource with a *contained* Questionnaire.  The Server updates the QuestionnaireResponse's contained Questionnaire by appending with the
        next question or questions ittems and any score or instruction items and returns the QuestionnaireResponse (with all answers completed
        thus far plus any calculated scores) as this parameter.  When the questionnaire is complete, the Server updates the status of the QuestionnaireResponse
        resource parameter to `complete`.
      type: Resource
    - name: test
      use: out
      min: 0
      max: '1'
      documentation: Test target profile
      type: Reference
  skip: true
  _skipReason: 'unmappable Java outs=["WARNING: The ''in'' profile http://hl7.org/fhir/test/StructureDefinition/op-def-in-profile|2.1.0 defines
    a parameter ''in'' but this is not in the parameters list in the operation definition", "ERROR: The parameter ''questionnaire'' has a value
    for ''min'' of ''1'' in the ''in'' profile 1 that is different to ''0'' which is the value in the parameter definition in the operation definition"]
    (DESIGN §15)'
- desc: graham/opdef2-params
  schemas: []
  _loadProfile:
  - opdef2-in-profile.json
  - opdef2-out-profile.json
  data:
    resourceType: OperationDefinition
    id: opdef2-params
    url: http://hl7.org/fhir/uv/sdc/OperationDefinition/opdef2-params
    title: Populate Questionnaire
    description: "Generates a [QuestionnaireResponse](http://hl7.org/fhir/R4/questionnaireresponse.html) instance  based on a specified [Questionnaire](http://hl7.org/fhir/R4/questionnaire.html),\
      \ filling in answers to questions where possible based on information provided as part of the operation or already known by the server about\
      \ the subject of the [Questionnaire](http://hl7.org/fhir/R4/questionnaire.html).\n\nIf the operation is not called at the instance level,\
      \ one and only one of the identifier, questionnaire or questionnaireRef `in` parameters must be provided.\n\nIf called at the instance level,\
      \ these parameters will be ignored.\nThe response will contain a [QuestionnaireResponse](http://hl7.org/fhir/R4/questionnaireresponse.html)\
      \ instance based on the specified [Questionnaire](http://hl7.org/fhir/R4/questionnaire.html) and/or an [OperationOutcome](http://hl7.org/fhir/R4/operationoutcome.html)\
      \ resource with errors or warnings.\n\nThe [QuestionnaireResponse](http://hl7.org/fhir/R4/questionnaireresponse.html) instance will be populated\
      \ with an unanswered set of questions following the group and question structure of the specified [Questionnaire](http://hl7.org/fhir/R4/questionnaire.html).\n\
      \nIf  *content* parameters were specified or the *local* parameter was set to true, some of the questions may have answers filled in as\
      \ well.  In the case of repeating questions or groups, typically only one repetition will be provided unless answer values exist that would\
      \ support populating multiple repetitions.  \n\nPopulation of the [QuestionnaireResponse](http://hl7.org/fhir/R4/questionnaireresponse.html)\
      \ with appropriate data is dependent on the questions and/or groups in the [Questionnaire](http://hl7.org/fhir/R4/questionnaire.html) having\
      \ metadata that allows the server to recognize the questions.  Guidance on mechanisms to perform population can be found [here](populate.html).\
      \  \nRegardless of the mechanism used to link the questions in a questionnaire to a \\\"known\\\" mappable concept, solutions using this\
      \ operation should ensure that the details of the question and associated linkage element are sufficiently similar as to safely allow auto-population;\
      \ i.e. the question text and context must be sufficiently the same, the value set for the question must fall within the value set for the\
      \ mapped element, the data types must be the same or convertible, etc.\"\n"
    contact:
    - telecom:
      - system: other
        value: http://www.hl7.org/Special/committees/fiwg
    resource:
    - Questionnaire
    parameter:
    - name: identifier
      use: in
      min: 0
      max: '1'
      type: Identifier
      documentation: A logical questionnaire identifier (i.e. `Questionnaire.identifier`). The server must know the questionnaire or be able to
        retrieve it from other known repositories.
    - extension:
      - url: http://hl7.org/fhir/StructureDefinition/operationdefinition-allowed-type
        valueUri: uri
      - url: http://hl7.org/fhir/StructureDefinition/operationdefinition-allowed-type
        valueUri: Reference
      - url: http://hl7.org/fhir/StructureDefinition/operationdefinition-allowed-type
        valueUri: Questionnaire
      name: questionnaire
      use: in
      min: 0
      max: '1'
      type: Element
      documentation: The Questionnaire to populate the response. Can be provided as a canonical for the questionnaire, a questionnaire reference,
        or directly as a questionnaire resource.
    - name: subject
      use: in
      min: 0
      max: '1'
      type: Reference
      documentation: The resource that is to be the *QuestionnaireResponse.subject*. The [QuestionnaireResponse](http://hl7.org/fhir/R4/questionnaireresponse.html)
        instance will reference the provided subject.  In addition, if the *local* parameter is set to true, server information about the specified
        subject will be used to populate the instance.
    - part:
      - name: name
        use: in
        min: 1
        max: '1'
        type: string
        documentation: The name of the launchContext or root Questionnaire variable the passed content should be used as for population purposes.  The
          name SHALL correspond to a launchContext or variable declared at the root of the Questionnaire. Allowed names include 'sourceQueries',
          which specifies that the context is the results of executing the queries in the sdc-questionnaire-sourceQueries extension.
      - extension:
        - url: http://hl7.org/fhir/StructureDefinition/operationdefinition-allowed-type
          valueUri: Reference
        - url: http://hl7.org/fhir/StructureDefinition/operationdefinition-allowed-type
          valueUri: Resource
        name: content
        use: in
        min: 1
        max: '*'
        type: Element
        documentation: The actual resource (or resources) to use as the value of the launchContext or variable. The content should be provided
          as a resource if the server performing the population may not have access to the content or the content is not available for RESTful
          retrieval (e.g. it's a search-response Bundle).
      name: context
      use: in
      min: 0
      max: '*'
      documentation: Resources containing information to be used to help populate the [QuestionnaireResponse](http://hl7.org/fhir/R4/questionnaireresponse.html).  These
        will typically be FHIR resources, though alternative population mechanisms might allow consumption of binaries containing FHIR documents,
        CDA documents or other source materials.  Servers might not support all possible source materials and may ignore materials they do not
        recognize.  (They MAY provide warnings if ignoring submitted resources.)
    - name: local
      use: in
      min: 0
      max: '1'
      type: boolean
      documentation: If specified and set to `true` (and the server is capable), the server should use what resources and other knowledge it has
        about the referenced subject when pre-populating answers to questions.
    - name: response
      use: out
      min: 1
      max: '1'
      type: QuestionnaireResponse
      documentation: The partially (or fully)-populated set of answers for the specified Questionnaire
    - name: issues
      use: out
      min: 0
      max: '1'
      type: OperationOutcome
      documentation: 'A list of hints and warnings about problems encountered while populating the questionnaire. These might be show to the user
        as an advisory note. Note: if the questionnaire cannot be populated at all, then the operation should fail, and an OperationOutcome is
        returned directly with the failure, rather than using this parameter'
    name: SDCPopulateQuestionnaire
    status: active
    kind: operation
    date: '2018-08-19T21:48:56+10:00'
    publisher: HL7 International - FHIR Infrastructure Work Group
    code: populate
    comment: While it is theoretically possible for a [QuestionnaireResponse](http://hl7.org/fhir/R4/questionnaireresponse.html) instance to be
      completely auto-populated and submitted without human review, the intention of this transaction is merely to reduce redundant data entry.  A
      client **SHOULD** ensure that a human submitter has an opportunity to review the auto-populated answers to confirm correctness as well as
      to complete or expand on information provided by the auto-population process.  When creating an "empty" questionnaire, the general algorithm
      is to create a QuestionnaireResponse with one item for every item in the source Questionnaire, including items with "enableWhen", "display"
      items, etc.  If a question has a default, the default answer should be populated.  And the QuestionnaireResponse should point back to the
      originating Questionnaire.  Repeating items will typically only include a single repetition.  Other extensions and/or elements may also
      be populated if the system is aware of appropriate values.  Complex form designs with conditional logic or tight constraints on cardinalities
      may be challenging to auto-populate.  A server MAY choose to traverse the questionnaire as if it were a human respondent, answering only
      those questions that are enabled based on previously answered questions.  However, doing so may result in minimal population.  Alternatively,
      systems may choose to populate all known answers, independent of dependencies and other constraints.  This may cause questions to be answered
      that should not be answered.  It will be up to the client to appropriately prune the final populated questionnaire once human review has
      taken place.  Invoking this operation with the `content` parameter may involve the disclosure of personally identifiable healthcare information
      to the system which is performing the population process.  No such disclosures should be made unless the system on which the operation is
      being invoked is a "trusted" system and appropriate agreements are in place to protect the confidentiality of any information shared with
      that system.
    system: false
    type: true
    instance: true
    inputProfile: http://hl7.org/fhir/uv/sdc/StructureDefinition/parameters-opdef2-params-in
    outputProfile: http://hl7.org/fhir/uv/sdc/StructureDefinition/parameters-opdef2-params-out
  skip: true
  _skipReason: no java outcome (DESIGN §15)
