suite: HL7 fhir-test-cases — R5 samples
# Imported from github.com/FHIR/fhir-test-cases/validator/manifest.json.
# Each test names its source file. Expected outputs are mapped from java
# validator messages to our fsNNN codes:
#   "Unrecognized property X"                          → fs201
#   "minimum required = N, but only found 0"           → fs301
#   "Array cannot be empty"                            → fs303
#   "Object must have some content"                    → fs202
#   "Boolean values must be 'true' or 'false'"         → fs103 (json type) or fs108 (date)
#   "Error parsing JSON: the primitive value must be"  → fs101 / fs102 / fs103

defaults:
  usePackages:
    - hl7.fhir.r5.core

tests:
  # ─── good (errorCount=0) ──────────────────────────────────────────────
  - desc: 'fhir-tests/patient-good: minimal valid Patient with narrative'
    schemas: []
    data:
      resourceType: Patient
      id: pat-good
      text:
        status: generated
        div: '<div xmlns="http://www.w3.org/1999/xhtml">some text</div>'
    valid: true

  - desc: 'fhir-tests/group-choice-good: Group with valid characteristic.value[x]'
    schemas: []
    data:
      resourceType: Group
      type: person
      membership: definitional
      characteristic:
        - code: { text: test }
          valueBoolean: true
          exclude: false
    valid: true

  - desc: 'fhir-tests/group-minimal: minimal Group'
    schemas: []
    data:
      resourceType: Group
      type: person
      membership: definitional
    valid: true

  # ─── bad (errorCount>0) — clear mappings ──────────────────────────────
  - desc: 'fhir-tests/list-empty2: List.entry is empty array → fs303'
    # "ERROR: List.entry: Array cannot be empty - the property should not be
    #  present if it has no values"
    schemas: []
    data:
      resourceType: List
      id: val1
      status: current
      mode: changes
      entry: []
    issues:
      - { code: fs303, path: [entry] }

  - desc: 'fhir-tests/group-choice-bad1: characteristic[0].value (no [x]) → fs201 + fs301'
    # Source: group-choice-bad1.json. Java reports:
    #   "Unrecognized property 'value'"        → fs201 (virtual choice parent)
    #   "value[x]: minimum required = 1"       → fs301 on the choice
    schemas: []
    data:
      resourceType: Group
      type: person
      membership: definitional
      characteristic:
        - code: { text: test }
          value: true
          exclude: false
    issues:
      - { code: fs201, path: [characteristic, 0, value] }
      - { code: fs301, path: [characteristic, 0, value] }

  # `fhir_comments` is a non-standard JSON5 extension that some FHIR
  # producers emit. The reference Java validator silently strips it before
  # validation; we tolerate it the same way (no fs201) — both at the
  # resource root and inside any nested object (e.g. `_id.fhir_comments`).
  - desc: 'fhir-tests/list-minimal: List with fhir_comments (non-standard JSON5)'
    schemas: []
    data:
      resourceType: List
      fhir_comments: [' this is all valid ']
      id: val1
      _id:
        fhir_comments: [' another comment ']
      status: current
      mode: changes
    valid: true

  # ─── unblocked by inner-resource walk ────────────────────────────────
  - desc: 'fhir-tests/bundle-good: Bundle with two Patient entries (refs by fullUrl)'
    schemas: []
    data:
      resourceType: Bundle
      id: bundle
      type: collection
      entry:
        - fullUrl: 'http://acme.com/Patient/pat1'
          resource:
            resourceType: Patient
            id: pat1
            link:
              - type: refer
                other: { reference: 'Patient/pat2' }
        - fullUrl: 'http://acme.com/Patient/pat2'
          resource:
            resourceType: Patient
            id: pat2
    valid: true

  # ─── batch 2 (after local-clone scan of fhir-test-cases repo) ────────
  - desc: 'fhir-tests/patient-lang1: Patient with language (xhtml lang warning is N/A for us)'
    schemas: []
    data:
      resourceType: Patient
      id: pat-good
      language: en-AU
      text:
        status: generated
        div: '<div xmlns="http://www.w3.org/1999/xhtml">some text</div>'
    valid: true

  - desc: 'fhir-tests/group-minimal-tiny: minimal Group'
    schemas: []
    data: { resourceType: Group, type: person, membership: definitional }
    valid: true

  - desc: 'fhir-tests/list-unknown-prop: List.other unknown → fs201'
    schemas: []
    data:
      resourceType: List
      id: val1
      other: nothing
      status: current
      mode: changes
    issues:
      - { code: fs201, path: [other] }

  - desc: 'fhir-tests/list-empty1: List.entry[0] = {} → fs202 + fs301 on item'
    schemas: []
    data:
      resourceType: List
      id: val1
      status: current
      mode: changes
      entry: [{}]
    issues:
      - { code: fs202, path: [entry, 0] }
      - { code: fs301, path: [entry, 0, item] }

  - desc: 'fhir-tests/patient-id-bad-1: id with underscore → fs110'
    # Java reports "Invalid Resource id: Invalid Characters ('bad-id_1')"
    schemas: []
    data: { resourceType: Patient, id: 'bad-id_1' }
    issues:
      - { code: fs110, path: [id] }

  # ─── batch 3: resource id validation ─────────────────────────────────
  - desc: 'fhir-tests/patient-id-bad-2: id with space → fs110'
    schemas: []
    data: { resourceType: Patient, id: 'bad-id 1' }
    issues:
      - { code: fs110, path: [id] }

  - desc: 'fhir-tests/patient-id-bad-3: id longer than 64 chars → fs110'
    schemas: []
    data:
      resourceType: Patient
      id: 'bad-id-too-long-very-long-very-long-very-long-very-long-very-long-very-long-very-long-very-long-very-long-very-long'
    issues:
      - { code: fs110, path: [id] }

  - desc: 'fhir-tests/resource-invalid-id-1: id with slash/equals → fs110'
    schemas: []
    data: { resourceType: Location, id: '/foobar==', name: 'A Location' }
    issues:
      - { code: fs110, path: [id] }

  - desc: 'fhir-tests/resource-invalid-id-2: 90-char Location id → fs110'
    schemas: []
    data:
      resourceType: Location
      id: 'foobarfoobarfoobarfoobarfoobarfoobarfoobarfoobarfoobarfoobarfoobarfoobarfoobarfoobarfoobar'
      name: 'A Location'
    issues:
      - { code: fs110, path: [id] }

  - desc: 'fhir-tests/group-choice-bad3: characteristic[0].value=string but type narrowed to boolean → fs1xx'
    # Java reports primitive value type mismatch on value[x] resolved-as-boolean
    schemas: []
    data:
      resourceType: Group
      type: person
      membership: definitional
      characteristic:
        - code: { text: x }
          valueBoolean: 'not-bool'
          exclude: false
    issues:
      - { code: fs103, path: [characteristic, 0, valueBoolean] }


